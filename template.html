<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'DejaVuSerif';
            src: url('{{font_path}}');
        }
        body { font-family: 'DejaVuSerif', sans-serif; font-size: 11px; }
        .title { text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0; }
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .items-table th, .items-table td { border: 1px solid #000; padding: 5px; text-align: left; }
    </style>
</head>
<body>
    <div class="title">Накладна № {{invoice_num}} від {{date}}</div>
    <table class="items-table">
        <tr><th>№</th><th>Товар</th><th>Од.</th><th>Кількість</th><th>Ціна</th><th>Сума</th></tr>
        {{items_rows}}
    </table>
    <p><b>Всього з ПДВ:</b> {{total_with_vat}} грн.</p>
</body>
</html>
