<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: DejaVu Sans, sans-serif; font-size: 11px; }
        .header-table { width: 100%; margin-bottom: 20px; }
        .title { text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0; }
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .items-table th, .items-table td { border: 1px solid #000; padding: 5px; text-align: left; }
        .totals-table { width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <table class="header-table">
        <tr><td><b>Одержувач:</b></td><td>ТОВ "МЕРЕЖА-СЕРВІС ЛЬВІВ"</td></tr>
        <tr><td><b>Постачальник:</b></td><td>ПП "ТРОЯНДА-ЗАХІД"</td></tr>
    </table>
    <div class="title">Накладна № {{invoice_num}} від {{date}}</div>
    <table class="items-table">
        <tr><th>№</th><th>Товар</th><th>Од.</th><th>Кількість</th><th>Ціна</th><th>Сума</th></tr>
        {{items_rows}}
    </table>
    <table class="totals-table">
        <tr><td style="text-align: right;"><b>Всього з ПДВ:</b> {{total_with_vat}} грн.</td></tr>
    </table>
</body>
</html>
